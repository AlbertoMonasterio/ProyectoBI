version: '3.8'
services:
  db:
    image: postgres:15
    container_name: seguro_alta_vista_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: proyectoMainBI
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: